# cargo-release configuration
# Run:  cargo release minor --execute   (new features)
#       cargo release patch --execute   (bug fixes)

# Push tag and commits automatically after release commit
push = true
push-remote = "origin"

# Don't sign tags
sign-tag = false
sign-commit = false

# Tag format
tag-name = "v{{version}}"
tag-message = "Release v{{version}}"

# git-cliff is run manually before cargo release:
#   git-cliff --output CHANGELOG.md --tag vX.Y.Z && git add CHANGELOG.md
# The hook is left empty; cargo-release handles Cargo.toml bumps + tag + push.

# Commit message for the version bump
pre-release-commit-message = "chore: release v{{version}}"

# This project is GitHub-distributed only — nothing is published to
# crates.io. Safe-by-default: never publish even if a `--no-publish`
# flag is forgotten on the command line.
publish = false
